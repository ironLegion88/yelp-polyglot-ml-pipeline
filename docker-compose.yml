version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: yelp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./docker-data/mongo:/data/db
    deploy:
      resources:
        limits:
          memory: 3G # Hard cap MongoDB memory

  neo4j:
    image: neo4j:5.18.0
    container_name: yelp_neo4j
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - ./docker-data/neo4j/data:/data
      - ./docker-data/neo4j/logs:/logs
    deploy:
      resources:
        limits:
          memory: 4G # Hard cap Neo4j memory